<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges" data-size="32" data-active="true" data-state="idle" data-motion="on" role="img" aria-labelledby="sheep-title sheep-desc" focusable="false"><title id="sheep-title">Овца</title><desc id="sheep-desc">Дворовая овца: спокойная поза и двухкадровый ступенчатый цикл ходьбы. Поддерживаются data-state idle и walking, режимы data-motion и prefers-reduced-motion.</desc><style>
svg{--sheep-speed:.8s;overflow:hidden}.pose-walk{display:none}.walk-b{opacity:0}svg[data-state="walking"] .pose-idle{display:none}svg[data-state="walking"] .pose-walk{display:inline}svg[data-motion="on"][data-active="true"][data-state="idle"] .idle-head{animation:sheep-idle 2.8s steps(2,end) infinite}svg[data-motion="on"][data-active="true"][data-state="walking"] .walk-a{animation:sheep-a var(--sheep-speed) steps(1,end) infinite}svg[data-motion="on"][data-active="true"][data-state="walking"] .walk-b{animation:sheep-b var(--sheep-speed) steps(1,end) infinite}svg[data-motion="slow"]{--sheep-speed:1.2s}svg[data-motion="fast"]{--sheep-speed:.5s}svg[data-motion="paused"] *{animation-play-state:paused!important}svg[data-motion="off"] *{animation:none!important}.fx-selection{display:none}svg[data-state="selected"] .fx-selection{display:inline}@keyframes sheep-idle{0%,70%,100%{transform:translateY(0)}76%,84%{transform:translateY(1px)}}@keyframes sheep-a{0%,49%{opacity:1}50%,100%{opacity:0}}@keyframes sheep-b{0%,49%{opacity:0}50%,100%{opacity:1}}@media(prefers-reduced-motion:reduce){.idle-head,.walk-a,.walk-b{animation:none!important;transform:none!important}.walk-a{opacity:1!important}.walk-b{opacity:0!important}}
</style><g class="pose-idle"><rect x="6" y="10" width="16" height="12" fill="#262626"/><rect x="4" y="14" width="20" height="8" fill="#262626"/><rect x="8" y="8" width="12" height="16" fill="#262626"/><rect x="8" y="12" width="14" height="10" fill="#efe6d4"/><rect x="6" y="16" width="18" height="4" fill="#efe6d4"/><rect x="10" y="10" width="8" height="14" fill="#efe6d4"/><g class="idle-head"><rect x="24" y="12" width="6" height="8" fill="#262626"/><rect x="26" y="14" width="4" height="4" fill="#443528"/><rect x="28" y="14" width="2" height="2" fill="#efe6d4"/><rect x="22" y="10" width="4" height="4" fill="#443528"/></g><rect x="8" y="22" width="4" height="6" fill="#262626"/><rect x="18" y="22" width="4" height="6" fill="#262626"/><rect x="4" y="14" width="4" height="4" fill="#443528"/></g>
<g class="pose-walk"><g class="walk-a"><rect x="6" y="10" width="16" height="12" fill="#262626"/><rect x="4" y="14" width="20" height="8" fill="#262626"/><rect x="8" y="8" width="12" height="16" fill="#262626"/><rect x="8" y="12" width="14" height="10" fill="#efe6d4"/><rect x="6" y="16" width="18" height="4" fill="#efe6d4"/><rect x="10" y="10" width="8" height="14" fill="#efe6d4"/><rect x="24" y="12" width="6" height="8" fill="#262626"/><rect x="26" y="14" width="4" height="4" fill="#443528"/><rect x="28" y="14" width="2" height="2" fill="#efe6d4"/><rect x="22" y="10" width="4" height="4" fill="#443528"/><rect x="6" y="22" width="4" height="6" fill="#262626"/><rect x="20" y="22" width="4" height="6" fill="#262626"/><rect x="4" y="14" width="4" height="4" fill="#443528"/></g><g class="walk-b"><rect x="6" y="10" width="16" height="12" fill="#262626"/><rect x="4" y="14" width="20" height="8" fill="#262626"/><rect x="8" y="8" width="12" height="16" fill="#262626"/><rect x="8" y="12" width="14" height="10" fill="#efe6d4"/><rect x="6" y="16" width="18" height="4" fill="#efe6d4"/><rect x="10" y="10" width="8" height="14" fill="#efe6d4"/><rect x="24" y="13" width="6" height="8" fill="#262626"/><rect x="26" y="15" width="4" height="4" fill="#443528"/><rect x="28" y="15" width="2" height="2" fill="#efe6d4"/><rect x="22" y="11" width="4" height="4" fill="#443528"/><rect x="10" y="22" width="4" height="6" fill="#262626"/><rect x="16" y="22" width="4" height="6" fill="#262626"/><rect x="4" y="14" width="4" height="4" fill="#443528"/></g></g><g class="fx-selection" aria-hidden="true"><rect x="2" y="2" width="8" height="2" fill="#e8b83a"/><rect x="2" y="2" width="2" height="8" fill="#e8b83a"/><rect x="22" y="2" width="8" height="2" fill="#e8b83a"/><rect x="28" y="2" width="2" height="8" fill="#e8b83a"/><rect x="2" y="28" width="8" height="2" fill="#e8b83a"/><rect x="2" y="22" width="2" height="8" fill="#e8b83a"/><rect x="22" y="28" width="8" height="2" fill="#e8b83a"/><rect x="28"