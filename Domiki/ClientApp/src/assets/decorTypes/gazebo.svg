<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges" data-size="64" data-active="true" data-state="idle" data-motion="on" role="img" aria-labelledby="gazebo-title gazebo-desc" focusable="false">
  <title id="gazebo-title">Беседка</title>
