<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges" data-size="64" data-active="true" data-state="idle" data-motion="on" role="img" aria-labelledby="lantern-title lantern-desc" focusable="false">
  <title id="lantern-title">Фонарь</title>
  <desc id="lantern-desc">Высокий кованый уличный фонарь с тёплым светом и устойчивым каменным основанием.</desc>
  <style>
    .tiny,.micro{display:inline}
    svg[data-size="32"] .tiny,svg[data-size="24"] .tiny{display:none}
    svg[data-size="24"] .micro{display:none}
    .lamp-light{transform-box:fill-box;transform-origin:center}
    svg[data-motion="on"][data-active="true"] .lamp-light{animation:lantern-light 2.8s steps(1,end) infinite}
    svg[data-state="disabled"] .scene{filter:saturate(.25);opacity:.58}
    svg:hover:not([data-state="disabled"]) .scene{animation:lantern-hover .28s steps(3,end)}
    @keyframes lantern-light{0%,40%,64%,100%{opacity:1}44%{opacity:.72}48%{opacity:1}56%{opacity:.82}}
    @keyframes lantern-hover{0%,100%{transform:translateY(0)}50%{transform:translateY(-1px)}}
    @media (prefers-reduced-motion:reduce){.scene,.lamp-light{animation:none!important;transform:none!important}}
  </style>
  <g class="scene">
    <!-- finial and cap -->
    <rect x="30" y="4" width="4" height="4" fill="#262626"/>
    <rect x="26" y="8" width="12" height="4" fill="#262626"/>
    <rect x="18" y="12" width="28" height="6" fill="#262626"/>
    <rect x="22" y="10" width="20" height="4" fill="#596064"/>

    <!-- glazed lamp: large warm core survives at 24 px -->
    <rect x="16" y="16" width="32" height="22" fill="#262626"/>
    <rect x="20" y="18" width="24" height="16" fill="#d68c32"/>
    <rect class="lamp-light" x="24" y="18" width="16" height="14" fill="#f2cf62"/>
    <rect x="28" y="18" width="8" height="14" fill="#ffe69a"/>
    <rect x="18" y="34" width="28" height="6" fill="#262626"/>
    <rect x="22" y="34" width="20" height="4" fill="#596064"/>
    <rect x="18" y="18" width="4" height="16" fill="#596064"/>
    <rect x="42" y="18" width="4" height="16" fill="#596064"/>

    <!-- post and flared foot -->
    <rect x="28" y="38" width="8" height="18" fill="#262626"/>
    <rect x="30" y="40" width="4" height="16" fill="#596064"/>
    <rect x="24" y="52" width="16" height="6" fill="#262626"/>
    <rect x="18" y="56" width="28" height="4" fill="#262626"/>
    <rect x="24" y="56" width="16" height="2" fill="#92999e"/>

    <g class="micro">
      <rect x="22" y="22" width="4" height="8" fill="#fff0b6"/>
      <rect x="38" y="20" width="2" height="10" fill="#b66b29"/>
      <rect x="26" y="44" width="2" height="8" fill="#92999e"/>
    </g>
    <g class="tiny lamp-light" fill="#f6dfa0">
      <rect x="10" y="20" width="4" height="10"/>
      <rect x="50" y="20" width="4" height="10"/>
      <rect x="14" y="16" width="2" height="18"/>
      <rect x="48" y="16" width="2" height="18"/>
    </g>
  </g>
</svg>
