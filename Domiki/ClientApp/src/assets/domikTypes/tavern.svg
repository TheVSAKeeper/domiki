<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" shape-rendering="crispEdges" data-level="1" data-size="128" data-working="false" data-motion="on" role="img" aria-labelledby="tavern-title tavern-desc" focusable="false" preserveAspectRatio="xMidYMid meet" color-interpolation="sRGB" data-active="true" data-state="idle" data-animation-profile="structure" style="--asset-phase:-1.12s">
  <title id="tavern-title">Корчма</title>
  <desc id="tavern-desc">Приземистая изба с котлом у крыльца. Уровни 1–3 добавляют котомки в дорогу и тёплый угол. Поддерживаются состояния idle, selected, attention, pressed, disabled и режимы motion on, slow, fast, paused, off.</desc>
  <style>svg[data-level="1"] .lvl2,svg[data-level="1"] .lvl3,svg[data-level="1"] .lvl4,svg[data-level="1"] .lvl5,svg[data-level="2"] .lvl3,svg[data-level="2"] .lvl4,svg[data-level="2"] .lvl5,svg[data-level="3"] .lvl4,svg[data-level="3"] .lvl5,svg[data-level="4"] .lvl5{display:none}.micro{}.tiny{}svg[data-size="64"] .tiny,svg[data-size="32"] .tiny{display:none}svg[data-size="32"] .micro{display:none}</style>
  <style>svg{--domiki-work-speed:3.2s;--asset-loop:4.8s;--asset-accent-loop:3.6s;--asset-fx-loop:3.2s;--asset-phase:-.6s;--asset-step:1px;--asset-neg-step:-1px;--asset-double-step:2px;--asset-neg-double-step:-2px;overflow:hidden}.asset-stage,.asset-fx,.asset-fx *{transform-box:fill-box;transform-origin:center}.asset-fx,.asset-fx *{pointer-events:none}svg[data-motion="on"][data-active="true"] .profile-grounded{animation:asset-enter .32s steps(4,end) both,asset-grounded var(--asset-loop) steps(1,end) var(--asset-phase) infinite}.asset-accent{transform-box:fill-box;transform-origin:center}svg[data-motion="on"][data-active="true"] .asset-accent{animation:asset-accent var(--asset-accent-loop) steps(1,end) var(--asset-local-phase,-.4s) infinite}.asset-phase-1{--asset-local-phase:-.45s}.asset-phase-2{--asset-local-phase:-1.15s}.asset-phase-3{--asset-local-phase:-2.05s}.asset-phase-4{--asset-local-phase:-2.8s}@keyframes asset-enter{0%{opacity:0;transform:translateY(2px)}66%{opacity:1;transform:translateY(-1px)}100%{opacity:1;transform:translateY(0)}}@keyframes asset-grounded{0%,78%,100%{opacity:1}82%{opacity:.97}86%{opacity:1}}@keyframes asset-accent{0%,42%,58%,100%{opacity:1}46%{opacity:.7}50%{opacity:1}54%{opacity:.84}}</style>
  <style>.work-state{display:none}.work-animated{transform-box:fill-box;transform-origin:center;animation-timing-function:steps(1,end);animation-iteration-count:infinite;animation-fill-mode:both}svg[data-working="true"] .work-state,svg[data-working="1"] .work-state{display:inline;animation:domiki-work-reveal 180ms steps(2,end) both}svg[data-working="true"] .work-animated,svg[data-working="1"] .work-animated{will-change:transform,opacity}.work-state .logic-tavern-steam{animation-name:domiki-tavern-steam;animation-duration:var(--domiki-work-speed)}.work-state .logic-tavern-fire{animation-name:domiki-tavern-fire;animation-duration:var(--domiki-work-speed)}@keyframes domiki-work-reveal{0%{opacity:0}50%,100%{opacity:1}}@keyframes domiki-tavern-steam{0%,32%,100%{opacity:0;transform:translateY(0)}38%,58%{opacity:1;transform:translateY(-4px)}66%{opacity:0;transform:translateY(-8px)}}@keyframes domiki-tavern-fire{0%,44%,100%{opacity:1}48%{opacity:.6}56%{opacity:1}}.fx-semantic,.fx-selection,.fx-attention{display:none}.fx-glint{opacity:0}svg[data-motion="on"][data-active="true"] .fx-glint{animation:fx-glint var(--asset-fx-loop) steps(1,end) var(--asset-fx-phase,-.5s) infinite}@keyframes fx-glint{0%,52%,100%{opacity:0}56%,64%{opacity:1}68%{opacity:0}}svg[data-state="selected"] .fx-selection{display:inline;animation:asset-selected 1.2s steps(1,end) infinite}svg[data-state="attention"] .fx-attention{display:inline;animation:asset-attention 1s steps(1,end) infinite}@keyframes asset-selected{0%,100%{opacity:1}50%{opacity:.55}}@keyframes asset-attention{0%,32%,100%{opacity:0}36%,68%{opacity:1}72%{opacity:0}}</style>
  <style>svg[data-state="pressed"] .asset-stage{animation:none!important;transform:translateY(var(--asset-step))}svg[data-state="disabled"] .asset-stage,svg[data-state="disabled"] .asset-fx{animation:none!important;filter:saturate(.25);opacity:.58}svg[data-state="hidden"] .asset-stage,svg[data-state="hidden"] .asset-fx{visibility:hidden}svg:hover:not([data-state="disabled"]) .asset-stage{animation:asset-hover .26s steps(3,end) both}@keyframes asset-hover{0%{transform:translateY(0)}60%{transform:translateY(var(--asset-neg-step))}100%{transform:translateY(0)}}svg[data-motion="slow"]{--domiki-work-speed:4.8s;--asset-loop:6.8s;--asset-accent-loop:5.2s;--asset-fx-loop:4.8s}svg[data-motion="fast"]{--domiki-work-speed:1.9s;--asset-loop:3.1s;--asset-accent-loop:2.4s;--asset-fx-loop:2s}svg[data-motion="paused"] *,svg[data-motion="paused"] .asset-stage{animation-play-state:paused!important}svg[data-motion="off"] *,svg[data-motion="off"] .asset-stage{animation:none!important}svg[data-size="32"] .fx-minor{display:none}svg[data-motion="on"][data-active="false"] .asset-stage,svg[data-motion="on"][data-active="false"] .asset-fx *{animation:none!important}@media (prefers-reduced-motion:reduce){.asset-stage,.asset-fx *,.asset-accent,.work-animated,.work-state{animation:none!important;transform:none!important}.fx-semantic,.fx-attention{display:none!important}}</style><style>svg[data-animation-profile="structure"] .asset-accent{--asset-accent-loop:4.4s}svg[data-animation-profile="wealth"] .fx-glint,svg[data-animation-profile="badge"] .fx-glint{--asset-fx-loop:2.8s}</style>
