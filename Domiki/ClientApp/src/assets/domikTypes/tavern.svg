<svg data-weather="clear" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" shape-rendering="crispEdges" data-size="128" data-level="1" data-working="false" data-active="true" data-state="idle" data-motion="on" role="img" aria-labelledby="tavern-title tavern-desc" focusable="false" preserveAspectRatio="xMidYMid meet" color-interpolation="sRGB"><title id="tavern-title">Таверна</title><desc id="tavern-desc">Широкая постоялая таверна с крутой крышей и трубой. Три уровня добавляют вывеску, лавку, слуховое окно и богатую отделку.</desc><style>
svg{--domiki-work-speed:3.2s;--asset-loop:4.8s;--asset-step:2px;overflow:hidden}.asset-stage,.asset-fx,.asset-fx *{transform-box:fill-box;transform-origin:center}.asset-fx,.asset-fx *{pointer-events:none}
svg[data-motion="on"][data-active="true"] .asset-stage{animation:asset-enter .32s steps(4,end) both,asset-grounded var(--asset-loop) steps(1,end) -.6s infinite}.fx-selection,.fx-attention{display:none}svg[data-state="selected"] .fx-selection{display:inline;animation:asset-pulse 1.2s steps(1,end) infinite}svg[data-state="attention"] .fx-attention{display:inline;animation:asset-attention 1s steps(1,end) infinite}svg[data-state="pressed"] .asset-stage{transform:translateY(2px)}svg[data-state="disabled"] .asset-stage,svg[data-state="disabled"] .asset-fx{filter:saturate(.25);opacity:.58}svg[data-state="hidden"] .asset-stage,svg[data-state="hidden"] .asset-fx{visibility:hidden}svg[data-motion="slow"]{--domiki-work-speed:4.8s;--asset-loop:6.8s}svg[data-motion="fast"]{--domiki-work-speed:1.9s;--asset-loop:3.1s}svg[data-motion="paused"] *{animation-play-state:paused!important}svg[data-motion="off"] *{animation:none!important}@keyframes asset-enter{0%{opacity:0;transform:translateY(4px)}70%{opacity:1;transform:translateY(-2px)}100%{opacity:1;transform:none}}@keyframes asset-grounded{0%,78%,100%{opacity:1}82%{opacity:.97}86%{opacity:1}}@keyframes asset-pulse{0%,100%{opacity:.45}50%{opacity:1}}@keyframes asset-attention{0%,32%,100%{opacity:0}38%,68%{opacity:1}74%{opacity:0}}@media(prefers-reduced-motion:reduce){.asset-stage,.asset-fx *,.work-animated{animation:none!important;transform:none!important}.fx-attention{display:none!important}}
svg[data-level="1"] .lvl2,svg[data-level="1"] .lvl3,svg[data-level="2"] .lvl3{display:none}
.work-state{display:none}svg[data-working="true"] .work-state,svg[data-working="1"] .work-state{display:inline}.smoke-a,.smoke-b{opacity:0}svg[data-working="true"][data-motion="on"] .smoke-a{animation:tavern-smoke var(--domiki-work-speed) steps(3,end) infinite}svg[data-working="true"][data-motion="on"] .smoke-b{animation:tavern-smoke var(--domiki-work-speed) steps(3,end) -.9s infinite}@keyframes tavern-smoke{0%{opacity:0;transform:translateY(4px)}34%,58%{opacity:1}100%{opacity:0;transform:translateY(-8px)}}
