<style>
.weather-reaction{display:none;pointer-events:none}
svg[data-weather="frost"] .weather-frost,svg[data-weather="rain"] .weather-rain,svg[data-weather="drought"] .weather-drought,svg[data-weather="wind"] .weather-wind,svg[data-weather="fair_day"] .weather-fair{display:inline}
.weather-reaction *{transform-box:fill-box;transform-origin:center}
svg[data-weather="rain"][data-motion="on"] .weather-drop{animation:domiki-weather-rain 1.2s steps(3,end) infinite}
svg[data-weather="wind"][data-motion="on"] .weather-streak{animation:domiki-weather-wind 1.8s steps(3,end) infinite}
svg[data-weather="fair_day"][data-motion="on"] .weather-glint{animation:domiki-weather-glint 2.8s steps(2,end) infinite}
svg[data-weather="drought"][data-motion="on"] .weather-dust{animation:domiki-weather-dust 2.4s steps(2,end) infinite}
@keyframes domiki-weather-rain{0%{opacity:0;transform:translateY(-4px)}34%,68%{opacity:.9}100%{opacity:0;transform:translateY(8px)}}
