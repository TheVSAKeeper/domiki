@keyframes domiki-weather-dust{0%,100%{opacity:0;transform:translateX(-2px)}50%{opacity:.72;transform:translateX(3px)}}
@media(prefers-reduced-motion:reduce){.weather-reaction *{animation:none!important;transform:none!important}}
