<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" shape-rendering="crispEdges" data-level="1" data-size="128" data-working="false" data-motion="on" role="img" aria-labelledby="sheepfold-title sheepfold-desc" focusable="false" preserveAspectRatio="xMidYMid meet" color-interpolation="sRGB" data-active="true" data-state="idle" data-animation-profile="structure" style="--asset-phase:-0.74s">
  <title id="sheepfold-title">Овчарня</title>
  <desc id="sheepfold-desc">Низкий загон с навесом для овец. Уровни 1–5 добавляют и увеличивают отару. Поддерживаются состояния idle, selected, attention, pressed, disabled и режимы motion on, slow, fast, paused, off.</desc>
  <style>svg[data-level="1"] .lvl2,svg[data-level="1"] .lvl3,svg[data-level="1"] .lvl4,svg[data-level="1"] .lvl5,svg[data-level="2"] .lvl3,svg[data-level="2"] .lvl4,svg[data-level="2"] .lvl5,svg[data-level="3"] .lvl4,svg[data-level="3"] .lvl5,svg[data-level="4"] .lvl5{display:none}.micro{}.tiny{}svg[data-size="64"] .tiny,svg[data-size="32"] .tiny{display:none}svg[data-size="32"] .micro{display:none}</style>
