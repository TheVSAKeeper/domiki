  <style>.work-state{display:none}.work-animated{transform-box:fill-box;transform-origin:center;animation-timing-function:steps(1,end);animation-iteration-count:infinite;animation-fill-mode:both}svg[data-working="true"] .work-state,svg[data-working="1"] .work-state{display:inline;animation:domiki-work-reveal 180ms steps(2,end) both}svg[data-working="true"] .work-animated,svg[data-working="1"] .work-animated{will-change:transform,opacity}.work-state .logic-sheepfold-gate{animation-name:domiki-sheepfold-gate;animation-duration:var(--domiki-work-speed)}.work-state .logic-sheepfold-wool{animation-name:domiki-sheepfold-wool;animation-duration:var(--domiki-work-speed)}@keyframes domiki-work-reveal{0%{opacity:0}50%,100%{opacity:1}}@keyframes domiki-sheepfold-gate{0%,28%,100%{transform:translateX(0)}34%,56%{transform:translateX(8px)}62%{transform:translateX(0)}}@keyframes domiki-sheepfold-wool{0%,36%,100%{opacity:0;transform:translateY(0)}42%,62%{opacity:1;transform:translateY(-4px)}70%{opacity:0;transform:translateY(-8px)}}.fx-semantic,.fx-selection,.fx-attention{display:none}.fx-glint{opacity:0}svg[data-motion="on"][data-active="true"] .fx-glint{animation:fx-glint var(--asset-fx-loop) steps(1,end) var(--asset-fx-phase,-.5s) infinite}@keyframes fx-glint{0%,52%,100%{opacity:0}56%,64%{opacity:1}68%{opacity:0}}svg[data-state="selected"] .fx-selection{display:inline;animation:asset-selected 1.2s steps(1,end) infinite}svg[data-state="attention"] .fx-attention{display:inline;animation:asset-attention 1s steps(1,end) infinite}@keyframes asset-selected{0%,100%{opacity:1}50%{opacity:.55}}@keyframes asset-attention{0%,32%,100%{opacity:0}36%,68%{opacity:1}72%{opacity:0}}</style>
  <style>svg[data-state="pressed"] .asset-stage{animation:none!important;transform:translateY(var(--asset-step))}svg[data-state="disabled"] .asset-stage,svg[data-state="disabled"] .asset-fx{animation:none!important;filter:saturate(.25);opacity:.58}svg[data-state="hidden"] .asset-stage,svg[data-state="hidden"] .asset-fx{visibility:hidden}svg:hover:not([data-state="disabled"]) .asset-stage{animation:asset-hover .26s steps(3,end) both}@keyframes asset-hover{0%{transform:translateY(0)}60%{transform:translateY(var(--asset-neg-step))}100%{transform:translateY(0)}}svg[data-motion="slow"]{--domiki-work-speed:4.8s;--asset-loop:6.8s;--asset-accent-loop:5.2s;--asset-fx-loop:4.8s}svg[data-motion="fast"]{--domiki-work-speed:1.9s;--asset-loop:3.1s;--asset-accent-loop:2.4s;--asset-fx-loop:2s}svg[data-motion="paused"] *,svg[data-motion="paused"] .asset-stage{animation-play-state:paused!important}svg[data-motion="off"] *,svg[data-motion="off"] .asset-stage{animation:none!important}svg[data-size="32"] .fx-minor{display:none}svg[data-motion="on"][data-active="false"] .asset-stage,svg[data-motion="on"][data-active="false"] .asset-fx *{animation:none!important}@media (prefers-reduced-motion:reduce){.asset-stage,.asset-fx *,.asset-accent,.work-animated,.work-state{animation:none!important;transform:none!important}.fx-semantic,.fx-attention{display:none!important}}</style><style>svg[data-animation-profile="structure"] .asset-accent{--asset-accent-loop:4.4s}svg[data-animation-profile="wealth"] .fx-glint,svg[data-animation-profile="badge"] .fx-glint{--asset-fx-loop:2.8s}</style>
