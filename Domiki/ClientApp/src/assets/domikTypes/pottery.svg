<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" shape-rendering="crispEdges" data-level="1" data-resolution="128" data-size="128" data-working="false" data-motion="on" data-animation-logic="semantic" data-process="куполная печь мерцает пламенем обжига, дым поднимается из трубы после разгорания">
  <title>Гончарня</title>
  <desc>Пиксельный SVG «Гончарня»: варианты 128/64/32, уровни 1–5 и предметный рабочий процесс data-working/data-motion.</desc>
  <style>
    svg[data-level="1"] .lvl2, svg[data-level="1"] .lvl3, svg[data-level="1"] .lvl4, svg[data-level="1"] .lvl5,
    svg[data-level="2"] .lvl3, svg[data-level="2"] .lvl4, svg[data-level="2"] .lvl5,
    svg[data-level="3"] .lvl4, svg[data-level="3"] .lvl5,
    svg[data-level="4"] .lvl5 { display: none; }

    .variant-medium, .variant-small { display: none; }
    svg[data-size="64"] .variant-full, svg[data-size="medium"] .variant-full,
    svg[data-size="32"] .variant-full, svg[data-size="small"] .variant-full { display: none; }
    svg[data-size="64"] .variant-medium, svg[data-size="medium"] .variant-medium { display: inline; }
    svg[data-size="32"] .variant-small, svg[data-size="small"] .variant-small { display: inline; }

    svg {
      --domiki-work-speed: 3.2s;
      --domiki-long-speed: 4.4s;
      --domiki-mech-speed: .64s;
    }
    svg[data-motion="slow"] {
      --domiki-work-speed: 4.8s;
      --domiki-long-speed: 6.6s;
      --domiki-mech-speed: .96s;
    }
    svg[data-motion="fast"] {
      --domiki-work-speed: 1.9s;
      --domiki-long-speed: 2.65s;
      --domiki-mech-speed: .4s;
    }

    .work-state { display: none; }
    svg[data-working="true"] .work-state,
    svg[data-working="1"] .work-state {
      display: inline;
      animation: domiki-work-reveal 180ms steps(2, end) both;
    }

    .work-animated {
      transform-box: fill-box;
      transform-origin: center;
      animation-duration: var(--domiki-work-speed);
      animation-timing-function: steps(1, end);
      animation-iteration-count: infinite;
      animation-fill-mode: both;
    }
    svg[data-working="true"] .work-animated,
    svg[data-working="1"] .work-animated { will-change: transform, opacity; }

    .work-state .work-animated.logic-pottery-fire { animation-name: domiki-pottery-fire; animation-duration: var(--domiki-mech-speed); animation-delay: 0s; transform-origin: 50% 100%; }
    .work-state .work-animated.logic-pottery-smoke { animation-name: domiki-pottery-smoke; animation-duration: var(--domiki-long-speed); animation-delay: 0s; }

    svg[data-motion="paused"] .work-animated,
    svg[data-motion="paused"] .work-state { animation-play-state: paused !important; }
    svg[data-motion="off"] .work-animated,
    svg[data-motion="off"] .work-state { animation: none !important; }

    @keyframes domiki-work-reveal {
      0% { opacity: 0; }
      50%, 100% { opacity: 1; }
    }
    @keyframes domiki-pottery-fire {
      0% { transform: translate(0, 0); opacity: .9; }
      25% { transform: translate(0, -2px); opacity: .75; }
      50% { transform: translate(0, -4px); opacity: 1; }
      75% { transform: translate(0, -2px); opacity: .8; }
      100% { transform: translate(0, 0); opacity: .9; }
    }
    @keyframes domiki-pottery-smoke {
      0%, 30% { opacity: 0; transform: translate(0, 8px); }
      34% { opacity: .9; transform: translate(0, 4px); }
      46% { opacity: 1; transform: translate(0, 0); }
      60% { opacity: .7; transform: translate(0, -4px); }
      72% { opacity: .4; transform: translate(2px, -8px); }
      80%, 100% { opacity: 0; transform: translate(2px, -12px); }
    }

    svg:not([data-working="true"]):not([data-working="1"]) .work-animated,
    svg[data-size="128"] .variant-medium .work-animated,
    svg[data-size="128"] .variant-small .work-animated,
    svg[data-size="64"] .variant-full .work-animated,
    svg[data-size="64"] .variant-small .work-animated,
    svg[data-size="medium"] .variant-full .work-animated,
    svg[data-size="medium"] .variant-small .work-animated,
    svg[data-size="32"] .variant-full .work-animated,
    svg[data-size="32"] .variant-medium .work-animated,
    svg[data-size="small"] .variant-full .work-animated,
    svg[data-size="small"] .variant-medium .work-animated {
      animation-name: none !important;
      will-change: auto;
    }

    @media (prefers-reduced-motion: reduce) {
      .work-animated, .work-state { animation: none !important; }
      .work-animated { opacity: 1; transform: none; }
    }
  </style>
