<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" shape-rendering="crispEdges" data-level="1" data-resolution="128" data-size="128" data-working="false" data-motion="on">
  <title>Кузница</title>
  <desc>Очищенная версия 128×128 со встроенными вариантами data-size="64" и data-size="32". Состояние работы: data-working="true".</desc>
  <style>
    svg[data-level="1"] .lvl2, svg[data-level="1"] .lvl3, svg[data-level="1"] .lvl4, svg[data-level="1"] .lvl5,
    svg[data-level="2"] .lvl3, svg[data-level="2"] .lvl4, svg[data-level="2"] .lvl5,
    svg[data-level="3"] .lvl4, svg[data-level="3"] .lvl5,
    svg[data-level="4"] .lvl5 { display: none }
  
    .variant-medium, .variant-small { display: none; }
    svg[data-size="64"] .variant-full, svg[data-size="medium"] .variant-full,
    svg[data-size="32"] .variant-full, svg[data-size="small"] .variant-full { display: none; }
    svg[data-size="64"] .variant-medium, svg[data-size="medium"] .variant-medium { display: inline; }
    svg[data-size="32"] .variant-small, svg[data-size="small"] .variant-small { display: inline; }

    /* Activity state: works only for inline SVG/SVGR. */
    .work-state { display: none; }
    svg[data-working="true"] .work-state,
    svg[data-working="1"] .work-state { display: inline; }

    .work-animated {
      transform-box: fill-box;
      transform-origin: center;
      will-change: transform, opacity;
    }
    .work-bob-y { animation: domiki-work-bob-y var(--domiki-work-speed, 1s) steps(2, end) infinite; }
    .work-bob-y-alt { animation: domiki-work-bob-y-alt var(--domiki-work-speed, 1s) steps(2, end) infinite; }
    .work-bob-x { animation: domiki-work-bob-x var(--domiki-work-speed, 1s) steps(2, end) infinite; }
    .work-slide-x { animation: domiki-work-slide-x var(--domiki-work-speed, 1s) steps(3, end) infinite; }
    .work-blink { animation: domiki-work-blink var(--domiki-work-speed, 1s) steps(2, end) infinite; }
    .work-blink-alt { animation: domiki-work-blink-alt var(--domiki-work-speed, 1s) steps(2, end) infinite; }
    .work-flicker { animation: domiki-work-flicker var(--domiki-work-speed, 1s) steps(2, end) infinite; }

    svg[data-motion="paused"] .work-animated { animation-play-state: paused !important; }
    svg[data-motion="off"] .work-animated { animation: none !important; }

    @keyframes domiki-work-bob-y {
      0%, 49% { transform: translate(0, 0); }
      50%, 100% { transform: translate(0, -4px); }
    }
    @keyframes domiki-work-bob-y-alt {
      0%, 49% { transform: translate(0, -4px); }
      50%, 100% { transform: translate(0, 0); }
    }
    @keyframes domiki-work-bob-x {
      0%, 49% { transform: translate(0, 0); }
      50%, 100% { transform: translate(4px, 0); }
    }
    @keyframes domiki-work-slide-x {
      0%, 32% { transform: translate(0, 0); }
      33%, 65% { transform: translate(4px, 0); }
      66%, 100% { transform: translate(8px, 0); }
    }
    @keyframes domiki-work-blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: .25; }
    }
    @keyframes domiki-work-blink-alt {
      0%, 49% { opacity: .25; }
      50%, 100% { opacity: 1; }
    }
    @keyframes domiki-work-flicker {
      0%, 49% { transform: translate(0, 0); opacity: 1; }
      50%, 100% { transform: translate(0, -4px); opacity: .8; }
    }

    @media (prefers-reduced-motion: reduce) {
      .work-animated { animation: none !important; }
    }
</style>
