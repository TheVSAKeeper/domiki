<g class="small-signature small-signature-dubrava"><rect x="4" y="2" width="56" height="10" fill="#262626"/><rect x="8" y="4" width="48" height="8" fill="#4f9a3c"/><rect x="0" y="8" width="12" height="8" fill="#262626"/><rect x="52" y="8" width="12" height="8" fill="#262626"/></g></g><g class="neighbor-small neighbor-small-dubrava"><rect x="16" y="8" width="32" height="8" fill="#262626"/><rect x="8" y="12" width="48" height="28" fill="#262626"/><rect x="4" y="20" width="56" height="16" fill="#262626"/><rect x="20" y="36" width="24" height="20" fill="#262626"/><rect x="16" y="52" width="32" height="8" fill="#262626"/><rect x="20" y="12" width="24" height="8" fill="#4f9a3c"/><rect x="12" y="16" width="40" height="20" fill="#4f9a3c"/><rect x="8" y="24" width="48" height="8" fill="#4f9a3c"/><rect x="24" y="36" width="8" height="16" fill="#704925"/><rect x="36" y="36" width="8" height="16" fill="#704925"/><rect x="30" y="32" width="8" height="12" fill="#704925"/></g><!-- Broad oak crown and split trunk. -->
