  <rect x="42" y="50" width="10" height="6" fill="#efe6d4" class="asset-accent asset-phase-2"/>
  <rect x="20" y="22" width="24" height="18" fill="#4f9a3c"/>
  <rect x="16" y="28" width="32" height="12" fill="#4f9a3c"/>
  <rect x="24" y="18" width="16" height="8" fill="#4f9a3c"/>
