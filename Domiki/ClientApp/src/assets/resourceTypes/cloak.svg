    <rect x="24" y="16" width="20" height="8" fill="#262626"/><rect x="20" y="24" width="28" height="12" fill="#262626"/><rect x="16" y="36" width="36" height="16" fill="#262626"/>
    <rect x="28" y="18" width="12" height="6" fill="#bf8a51"/><rect x="24" y="24" width="20" height="10" fill="#bf8a51"/><rect x="20" y="36" width="28" height="14" fill="#bf8a51"/>
    <rect x="32" y="20" width="8" height="4" fill="#5c3525"/><rect x="28" y="24" width="8" height="6" fill="#5c3525"/><rect x="24" y="36" width="8" height="12" fill="#8e5b38"/>
    <rect x="40" y="30" width="4" height="16" fill="#e0b66d"/><rect x="20" y="48" width="28" height="2" fill="#5c3525"/>
    <g class="micro"><rect x="36" y="36" width="4" height="10" fill="#d89f5b"/><rect x="28" y="32" width="12" height="2" fill="#e0b66d"/></g>
