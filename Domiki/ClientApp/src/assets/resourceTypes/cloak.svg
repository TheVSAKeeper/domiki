<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges" data-size="64" role="img" aria-labelledby="cloak-title cloak-desc" focusable="false" preserveAspectRatio="xMidYMid meet" color-interpolation="sRGB" data-active="true" data-state="idle" data-motion="on" data-animation-profile="material" style="--asset-phase:-1.73s">
  <title id="cloak-title">Плащ</title>
  <desc id="cloak-desc">Тёплый шерстяной плащ с капюшоном на деревянном колышке. Поддерживаются состояния idle, selected, attention, pressed, disabled и режимы motion on, slow, fast, paused, off.</desc>
  <style>.micro{}.tiny{}svg[data-size="32"] .tiny,svg[data-size="24"] .tiny{display:none}svg[data-size="24"] .micro{display:none}.scene{transform-box:fill-box;transform-origin:center}svg[data-state="pressed"] .scene{transform:translateY(1px)}svg[data-state="disabled"] .scene{filter:saturate(.25);opacity:.58}svg[data-state="hidden"] .scene{visibility:hidden}@media (prefers-reduced-motion:reduce){.scene{transform:none!important}}</style>
