<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges" data-size="64" data-active="true" data-state="idle" data-motion="on" role="img" aria-labelledby="cheese-title cheese-desc" focusable="false" preserveAspectRatio="xMidYMid meet" color-interpolation="sRGB"><title id="cheese-title">Сыр</title><desc id="cheese-desc">Золотистый ступенчатый клин сыра с тёмной коркой и крупными отверстиями.</desc><style>
.micro{} .tiny{}
svg[data-size="32"] .tiny,svg[data-size="24"] .tiny{display:none}svg[data-size="24"] .micro{display:none}
svg{--asset-loop:4.8s;--asset-step:1px;overflow:hidden}.asset-stage,.asset-fx,.asset-fx *{transform-box:fill-box;transform-origin:center}.asset-fx,.asset-fx *{pointer-events:none}
svg[data-motion="on"][data-active="true"] .asset-stage{animation:asset-enter .28s steps(3,end) both,asset-grounded var(--asset-loop) steps(1,end) -.6s infinite}
.asset-accent{animation:asset-accent 3.4s steps(1,end) -.8s infinite}.fx-glint{opacity:0}svg[data-motion="on"][data-active="true"] .fx-glint{animation:asset-glint 3.2s steps(1,end) -.5s infinite}
.fx-selection,.fx-attention{display:none}svg[data-state="selected"] .fx-selection{display:inline;animation:asset-pulse 1.2s steps(1,end) infinite}svg[data-state="attention"] .fx-attention{display:inline;animation:asset-attention 1s steps(1,end) infinite}
svg[data-state="pressed"] .asset-stage{transform:translateY(1px)}svg[data-state="disabled"] .asset-stage,svg[data-state="disabled"] .asset-fx{filter:saturate(.25);opacity:.58}svg[data-state="hidden"] .asset-stage,svg[data-state="hidden"] .asset-fx{visibility:hidden}
svg[data-motion="slow"]{--asset-loop:6.8s}svg[data-motion="fast"]{--asset-loop:3.1s}svg[data-motion="paused"] *{animation-play-state:paused!important}svg[data-motion="off"] *{animation:none!important}
@keyframes asset-enter{0%{opacity:0;transform:translateY(2px)}70%{opacity:1;transform:translateY(-1px)}100%{opacity:1;transform:none}}@keyframes asset-grounded{0%,78%,100%{opacity:1}82%{opacity:.96}86%{opacity:1}}@keyframes asset-accent{0%,44%,58%,100%{opacity:1}48%{opacity:.72}52%{opacity:1}56%{opacity:.86}}@keyframes asset-glint{0%,52%,100%{opacity:0}58%,66%{opacity:1}70%{opacity:0}}@keyframes asset-pulse{0%,100%{opacity:.45}50%{opacity:1}}@keyframes asset-attention{0%,32%,100%{opacity:0}38%,68%{opacity:1}74%{opacity:0}}
@media (prefers-reduced-motion:reduce){.asset-stage,.asset-fx *,.asset-accent{animation:none!important;transform:none!important}.fx-glint,.fx-attention{display:none!important}}
</style><g class="asset-stage">
